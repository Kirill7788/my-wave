name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DB_HOST: 127.0.0.1
  DB_NAME: mywave_test
  DB_USER: mywave_ci
  DB_PASS: ci_password
  APP_ENV: development
  APP_URL: http://localhost:8000
  BASE_URL: http://localhost:8000

jobs:
  test:
    name: E2E Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE:      mywave_test
          MYSQL_USER:          mywave_ci
          MYSQL_PASSWORD:      ci_password
          MYSQL_ROOT_PASSWORD: root_password
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── PHP setup ────────────────────────────────────────────────────────
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, apcu
          ini-values: apc.enable_cli=1

      - name: Install PHP dependencies
        run: composer install --no-interaction --optimize-autoloader

      # ── Database setup ────────────────────────────────────────────────────
      - name: Apply schema
        run: |
          mysql -h 127.0.0.1 -u mywave_ci -pci_password mywave_test < database/schema.sql
          mysql -h 127.0.0.1 -u mywave_ci -pci_password mywave_test < database/seed.sql
          mysql -h 127.0.0.1 -u mywave_ci -pci_password mywave_test < database/trigger.sql

      # ── .env ─────────────────────────────────────────────────────────────
      - name: Create .env
        run: |
          echo "APP_ENV=development"    > .env
          echo "DB_HOST=127.0.0.1"     >> .env
          echo "DB_NAME=mywave_test"   >> .env
          echo "DB_USER=mywave_ci"     >> .env
          echo "DB_PASS=ci_password"   >> .env
          echo "APP_URL=http://localhost:8000" >> .env

      # ── Start PHP server ─────────────────────────────────────────────────
      - name: Start PHP development server
        run: |
          php -S localhost:8000 &
          echo "PHP_PID=$!" >> $GITHUB_ENV
          sleep 2
          curl -sf http://localhost:8000/api/cottages.php?limit=1 || exit 1
          echo "PHP server is up"

      # ── Node.js + Playwright ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run Playwright tests (shard ${{ matrix.shard }})
        run: |
          npx playwright test \
            --shard=${{ matrix.shard }} \
            --reporter=github,blob

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload test results blob
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 7

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ strategy.job-index }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ── Merge reports ──────────────────────────────────────────────────────────
  merge-reports:
    name: Merge Test Reports
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci

      - name: Download all blobs
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-*
          path: all-blobs
          merge-multiple: true

      - name: Merge reports
        run: npx playwright merge-reports --reporter=html ./all-blobs

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 14
