<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Войти — Моя волна</title>
  <meta name="description" content="Войдите в личный кабинет My Wave для управления бронированиями.">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ── Page reset ── */
    html, body { height: 100%; }
    body { background: var(--c-warm-white); }

    /* ── Split layout ── */
    .auth-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      min-height: 100svh;
    }

    /* ── Left: atmospheric photo panel ── */
    .auth-visual {
      position: relative;
      overflow: hidden;
      background: var(--c-deep);
    }

    .auth-visual__bg {
      position: absolute;
      inset: 0;
      background-image: url('images/hero-lake.jpg');
      background-size: cover;
      background-position: center 35%;
      transition: transform 8s ease;
    }

    .auth-visual__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        165deg,
        rgba(17, 27, 20, 0.55) 0%,
        rgba(17, 27, 20, 0.25) 50%,
        rgba(17, 27, 20, 0.65) 100%
      );
    }

    .auth-visual__content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--sp-10) var(--sp-10);
      z-index: 1;
    }

    .auth-visual__logo {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 600;
      font-style: italic;
      color: var(--c-warm-white);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .auth-visual__quote {
      font-family: var(--font-serif);
      font-size: var(--text-3xl);
      font-weight: 400;
      font-style: italic;
      color: var(--c-warm-white);
      line-height: var(--leading-snug);
      letter-spacing: var(--tracking-snug);
      max-width: 380px;
    }

    .auth-visual__caption {
      font-size: var(--text-xs);
      color: rgba(250,250,248,0.45);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
    }

    /* ── Right: form panel ── */
    .auth-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: var(--sp-12) var(--sp-10);
      background: var(--c-warm-white);
      overflow-y: auto;
    }

    .auth-panel__inner {
      width: 100%;
      max-width: 400px;
    }

    /* Back link */
    .auth-back {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--c-text-light);
      text-decoration: none;
      margin-bottom: var(--sp-10);
      transition: color var(--dur-fast);
    }
    .auth-back:hover { color: var(--c-text); }

    /* Heading */
    .auth-heading {
      font-family: var(--font-serif);
      font-size: var(--text-4xl);
      font-weight: 600;
      font-style: italic;
      color: var(--c-text);
      line-height: var(--leading-snug);
      letter-spacing: var(--tracking-snug);
      margin-bottom: var(--sp-2);
    }

    .auth-subheading {
      font-size: var(--text-sm);
      color: var(--c-text-light);
      font-weight: 300;
      margin-bottom: var(--sp-8);
      line-height: var(--leading-relaxed);
    }

    /* Form */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }

    .auth-form label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--c-text-light);
      margin-bottom: var(--sp-2);
    }

    .auth-form input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-md);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      color: var(--c-text);
      background: var(--c-white);
      transition:
        border-color var(--dur-fast) var(--ease-natural),
        box-shadow var(--dur-fast) var(--ease-natural);
      outline: none;
      -webkit-appearance: none;
    }

    .auth-form input:hover { border-color: var(--c-stone); }
    .auth-form input:focus {
      border-color: var(--c-amber);
      box-shadow: 0 0 0 3px rgba(196,144,90,0.14);
    }
    .auth-form input::placeholder { color: var(--c-text-muted); }

    /* Submit button */
    .auth-submit {
      width: 100%;
      padding: 15px;
      background: var(--c-forest-mid);
      color: var(--c-warm-white);
      border: none;
      border-radius: var(--r-md);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      cursor: pointer;
      transition:
        background var(--dur-base) var(--ease-natural),
        transform var(--dur-base) var(--ease-smooth),
        box-shadow var(--dur-base) var(--ease-natural);
      margin-top: var(--sp-2);
    }

    .auth-submit:hover {
      background: var(--c-forest);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(30,48,37,0.25);
    }

    .auth-submit:active { transform: none; }
    .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Forgot password */
    .auth-forgot {
      display: block;
      text-align: center;
      font-size: var(--text-xs);
      color: var(--c-text-muted);
      text-decoration: none;
      margin-top: var(--sp-3);
      letter-spacing: var(--tracking-normal);
      transition: color var(--dur-fast);
    }
    .auth-forgot:hover { color: var(--c-amber); }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      margin: var(--sp-6) 0;
      color: var(--c-text-muted);
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--c-border);
    }

    /* Toggle button */
    .auth-toggle {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: var(--c-text-mid);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-md);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition:
        border-color var(--dur-fast),
        color var(--dur-fast),
        background var(--dur-fast);
    }
    .auth-toggle:hover {
      border-color: var(--c-amber-light);
      color: var(--c-amber-deep);
      background: var(--c-warning-bg);
    }

    /* Name field (only shown on register) */
    .auth-name-group { display: none; }
    .auth-name-group.visible { display: block; }

    /* Error message */
    .auth-error {
      display: none;
      font-size: var(--text-sm);
      color: var(--c-error);
      background: var(--c-error-bg);
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--r-md);
      border-left: 3px solid var(--c-error);
      margin-bottom: var(--sp-2);
    }
    .auth-error.visible { display: block; }

    /* Success message */
    .auth-success {
      display: none;
      font-size: var(--text-sm);
      color: var(--c-success);
      background: var(--c-success-bg);
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--r-md);
      border-left: 3px solid var(--c-success);
      margin-bottom: var(--sp-2);
    }
    .auth-success.visible { display: block; }

    /* ── Mobile: stack vertically ── */
    @media (max-width: 768px) {
      .auth-layout {
        grid-template-columns: 1fr;
      }

      .auth-visual {
        height: 240px;
        min-height: 0;
      }

      .auth-visual__quote { font-size: var(--text-2xl); }

      .auth-panel {
        padding: var(--sp-8) var(--sp-5);
        justify-content: flex-start;
      }

      .auth-back { margin-bottom: var(--sp-6); }
      .auth-heading { font-size: var(--text-3xl); }
    }
  </style>
</head>

<body>
  <div class="auth-layout">

    <!-- Left: atmospheric visual panel -->
    <div class="auth-visual" aria-hidden="true">
      <div class="auth-visual__bg"></div>
      <div class="auth-visual__overlay"></div>
      <div class="auth-visual__content">
        <a href="index.html" class="auth-visual__logo">My Wave</a>
        <blockquote class="auth-visual__quote">
          Природа ждёт.<br>Осталось только выбрать место.
        </blockquote>
        <p class="auth-visual__caption">Беларусь · 10 озёр · 30+ домиков</p>
      </div>
    </div>

    <!-- Right: form panel -->
    <div class="auth-panel">
      <div class="auth-panel__inner">

        <a href="index.html" class="auth-back">← На главную</a>

        <h1 class="auth-heading" id="formTitle">Добро<br>пожаловать</h1>
        <p class="auth-subheading" id="formDesc">Войдите, чтобы управлять бронированиями</p>

        <div class="auth-error" id="authError"></div>
        <div class="auth-success" id="authSuccess"></div>

        <form id="loginForm" class="auth-form" novalidate>

          <div class="auth-name-group" id="nameGroup">
            <label for="firstName">Имя</label>
            <input type="text" id="firstName" placeholder="Иван" autocomplete="given-name" />
          </div>

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
          </div>

          <div>
            <label for="password">Пароль</label>
            <input type="password" id="password" required autocomplete="current-password" minlength="6" />
          </div>

          <button type="submit" class="auth-submit" id="submitBtn">Войти</button>

          <a href="reset-password.html" class="auth-forgot" id="forgotLink">Забыли пароль?</a>

        </form>

        <div class="auth-divider"><span>или</span></div>

        <button id="toggleAuth" class="auth-toggle">Создать аккаунт</button>

      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script>
    // Check session before rendering
    (async () => {
      try {
        const cached = sessionStorage.getItem('currentUser');
        if (cached) {
          const u = JSON.parse(cached);
          window.location.replace(u.role === 'admin' ? 'admin.html' : 'dashboard.html');
          return;
        }
        const { user } = await API.getCurrentUser();
        if (user) {
          sessionStorage.setItem('currentUser', JSON.stringify(user));
          window.location.replace(user.role === 'admin' ? 'admin.html' : 'dashboard.html');
        }
      } catch {}
    })();

    const form       = document.getElementById('loginForm');
    const titleEl    = document.getElementById('formTitle');
    const descEl     = document.getElementById('formDesc');
    const toggleBtn  = document.getElementById('toggleAuth');
    const submitBtn  = document.getElementById('submitBtn');
    const nameGroup  = document.getElementById('nameGroup');
    const forgotLink = document.getElementById('forgotLink');
    const errorEl    = document.getElementById('authError');
    const successEl  = document.getElementById('authSuccess');

    let isLogin = true;

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
      successEl.classList.remove('visible');
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.classList.add('visible');
      errorEl.classList.remove('visible');
    }

    function clearMessages() {
      errorEl.classList.remove('visible');
      successEl.classList.remove('visible');
    }

    toggleBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      clearMessages();

      if (isLogin) {
        titleEl.innerHTML = 'Добро<br>пожаловать';
        descEl.textContent = 'Войдите, чтобы управлять бронированиями';
        submitBtn.textContent = 'Войти';
        toggleBtn.textContent = 'Создать аккаунт';
        forgotLink.style.display = 'block';
        nameGroup.classList.remove('visible');
        document.getElementById('password').setAttribute('autocomplete', 'current-password');
      } else {
        titleEl.innerHTML = 'Создать<br>аккаунт';
        descEl.textContent = 'Зарегистрируйтесь за минуту';
        submitBtn.textContent = 'Зарегистрироваться';
        toggleBtn.textContent = 'Уже есть аккаунт? Войти';
        forgotLink.style.display = 'none';
        nameGroup.classList.add('visible');
        document.getElementById('password').setAttribute('autocomplete', 'new-password');
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) return showError('Пожалуйста, заполните все поля');

      submitBtn.disabled = true;
      submitBtn.textContent = isLogin ? 'Вход...' : 'Регистрация...';

      try {
        if (isLogin) {
          const res = await API.login({ email, password });
          sessionStorage.setItem('currentUser', JSON.stringify(res.user));
          window.location.replace(res.user.role === 'admin' ? 'admin.html' : 'dashboard.html');
        } else {
          const firstName = document.getElementById('firstName').value.trim() || email.split('@')[0];
          await API.register({ email, password, first_name: firstName, phone: '+375000000000' });
          showSuccess('Аккаунт создан! Войдите с вашими данными.');
          isLogin = true;
          toggleBtn.click();
        }
      } catch (err) {
        showError(err.message || 'Произошла ошибка. Попробуйте ещё раз.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
      }
    });
  </script>
</body>
</html>
