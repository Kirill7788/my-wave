<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сброс пароля — Моя волна</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .reset-container { max-width: 450px; margin: 120px auto; padding: 40px; background: white; border-radius: var(--radius); box-shadow: var(--shadow-lg); }
    .reset-container h1 { text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); }
    .btn--full { width: 100%; }
    .back-link { text-align: center; margin-top: 20px; display: block; color: var(--color-primary); }
  </style>
</head>
<body>
  <div class="reset-container">
    <h1>🔐 Сброс пароля</h1>
    
    <!-- Форма запроса сброса -->
    <div id="requestForm">
      <p style="text-align: center; color: var(--color-text-light); margin-bottom: 24px;">
        Введите ваш email, и мы отправим ссылку для сброса пароля
      </p>
      <form id="resetRequestForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="resetEmail" required placeholder="your@email.com">
        </div>
        <button type="submit" class="btn btn--primary btn--full">📧 Отправить ссылку</button>
      </form>
      <a href="cabinet.html" class="back-link">← Вернуться ко входу</a>
    </div>
    
    <!-- Форма установки нового пароля -->
    <div id="newPasswordForm" style="display: none;">
      <p style="text-align: center; color: var(--color-text-light); margin-bottom: 24px;">
        Введите новый пароль
      </p>
      <form id="setPasswordForm">
        <div class="form-group">
          <label>Новый пароль</label>
          <input type="password" id="newPass" required minlength="6">
        </div>
        <div class="form-group">
          <label>Подтвердите пароль</label>
          <input type="password" id="confirmPass" required minlength="6">
        </div>
        <button type="submit" class="btn btn--primary btn--full">🔐 Установить пароль</button>
      </form>
    </div>
    
    <!-- Сообщение об успехе -->
    <div id="successMessage" style="display: none; text-align: center;">
      <div style="font-size: 3rem; margin-bottom: 16px;">✅</div>
      <h2>Пароль изменён!</h2>
      <p style="color: var(--color-text-light); margin: 16px 0 24px;">
        Теперь вы можете войти с новым паролем
      </p>
      <a href="cabinet.html" class="btn btn--primary btn--full">Войти</a>
    </div>
  </div>
  
  <script src="js/api.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    
    // Если есть токен — показываем форму нового пароля
    if (token) {
      document.getElementById('requestForm').style.display = 'none';
      document.getElementById('newPasswordForm').style.display = 'block';
      
      document.getElementById('setPasswordForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPass = document.getElementById('newPass').value;
        const confirm = document.getElementById('confirmPass').value;
        
        if (newPass !== confirm) {
          alert('❌ Пароли не совпадают');
          return;
        }
        
        try {
          await API.request('auth.php?action=confirm_reset', {
            method: 'POST',
            body: { token, new_password: newPass }
          });
          
          document.getElementById('newPasswordForm').style.display = 'none';
          document.getElementById('successMessage').style.display = 'block';
        } catch (err) {
          alert('❌ ' + err.message);
        }
      });
    }
    
    // Запрос сброса пароля
    document.getElementById('resetRequestForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;
      
      try {
        const res = await API.request('auth.php?action=reset_password', {
          method: 'POST',
          body: { email }
        });
        
        alert('✅ Если email зарегистрирован, вы получите ссылку для сброса пароля.\n\n' + 
              (res.debug_link ? 'Ссылка для отладки: ' + res.debug_link : ''));
      } catch (err) {
        alert('❌ Ошибка: ' + err.message);
      }
    });
  </script>
</body>
</html>
